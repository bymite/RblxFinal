name: Build and Inject Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ldid & dependencies
        run: |
          brew install ldid

      - name: Build dylib with clang
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang \
            -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=14.0 \
            -dynamiclib \
            -fobjc-arc \
            -framework Foundation \
            -framework CFNetwork \
            -o RobloxProxy.dylib \
            Tweak.m
          echo "Built dylib:"
          ls -lh RobloxProxy.dylib

      - name: Install insert_dylib
        run: |
          git clone https://github.com/tyilo/insert_dylib
          cd insert_dylib
          xcodebuild -configuration Release -quiet
          sudo cp build/Release/insert_dylib /usr/local/bin/

      - name: Download IPA
        run: |
          curl -L \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            -o Roblox.ipa \
            "https://github.com/bymite/RblxFinal/releases/download/Ipa/com.roblox.robloxmobile-2.715.1115-Decrypted.ipa"
          echo "Downloaded:"
          ls -lh Roblox.ipa

      - name: Inject dylib into IPA
        run: |
          unzip -q Roblox.ipa -d roblox_extracted

          APP=$(find roblox_extracted/Payload -name "*.app" -maxdepth 1 | head -n 1)
          BINARY=$(find "$APP" -maxdepth 1 -type f -perm +111 | head -n 1)
          echo "App: $APP"
          echo "Binary: $BINARY"

          cp RobloxProxy.dylib "$APP/RobloxProxy.dylib"

          insert_dylib --strip-codesig --inplace \
            @executable_path/RobloxProxy.dylib \
            "$BINARY"

          cd roblox_extracted
          zip -qr ../Roblox_patched.ipa Payload
          cd ..
          echo "Done!"

      - name: Upload patched IPA
        uses: actions/upload-artifact@v4
        with:
          name: Roblox_patched
          path: Roblox_patched.ipa
          retention-days: 7
