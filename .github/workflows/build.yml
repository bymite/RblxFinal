name: Build and Inject Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: brew install ldid

      - name: Build dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)

          clang \
            -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=14.0 \
            -dynamiclib \
            -fobjc-arc \
            -framework Foundation \
            -framework UIKit \
            -framework CoreGraphics \
            -framework CFNetwork \
            -o RobloxProxy.dylib \
            Tweak.m

      - name: Install insert_dylib
        run: |
          git clone https://github.com/tyilo/insert_dylib
          cd insert_dylib
          xcodebuild -configuration Release -quiet
          sudo cp build/Release/insert_dylib /usr/local/bin/

      - name: Download IPA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download Ipa \
            --repo bymite/RblxFinal \
            --pattern "*.ipa" \
            --output Roblox.ipa

      - name: Inject dylib
        run: |
          unzip -q Roblox.ipa -d app
          APP=$(find app/Payload -name "*.app" -maxdepth 1 | head -n 1)
          BIN=$(find "$APP" -type f -perm +111 | head -n 1)

          cp RobloxProxy.dylib "$APP/"
          insert_dylib --strip-codesig --inplace \
            @executable_path/RobloxProxy.dylib "$BIN"

          # Signing the dylib and binary to prevent immediate crashes
          ldid -S RobloxProxy.dylib
          ldid -S "$BIN"

          cd app
          zip -qry ../Roblox-Injected.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Injected-IPA
          path: Roblox-Injected.ipa
